services:
  swingbot:
    build: .
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SWINGBOT_HOST=0.0.0.0
      - SWINGBOT_DATA_DIR=/data
      - HF_HOME=/hf-cache
      # autodash reads the live core-engine SQLite DBs (journal/state/candles)
      - CORE_ENGINE_DATA=/core-engine-data
    ports:
      - "8000:8000"
    volumes:
      - ${HOME}/.swingbot:/data
      - ${HOME}/.cache/huggingface:/hf-cache
      # the live autonomous core-engine persists into this named volume
      - core_engine_data:/core-engine-data
    restart: unless-stopped

volumes:
  # Created by the core-engine stack; must already exist (docker compose up fails otherwise).
  # Mounted read-mostly here so the dashboard can read the live bot's journal/state/candles.
  core_engine_data:
    external: true
